<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Solid Green Hexagon Fill -->
  <polygon fill="#10b981" points="50,5 93.3,30 93.3,70 50,95 6.7,70 6.7,30"/>
  
  <!-- White Hexagon Outline -->
  <polygon fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" points="50,5 93.3,30 93.3,70 50,95 6.7,70 6.7,30"/>
  
  <!-- Asymmetrical Stylized Leaves (White) -->
  <!-- Left smaller leaf -->
  <path fill="#ffffff" d="M 40,62 A 20,20 0 0,1 20,25 A 20,20 0 0,1 40,62 Z" />
  <!-- Right larger leaf crossing over -->
  <path fill="#ffffff" d="M 40,62 A 35,35 0 0,1 75,15 A 35,35 0 0,1 40,62 Z" />
  <!-- Leaf veins/stems (transparent cutouts or just overlaps) -->
  
  <!-- Trendline (White) with data point nodes -->
  <polyline fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" points="25,80 45,70 65,75 80,55" />
  <circle cx="25" cy="80" r="3" fill="#ffffff" />
  <circle cx="45" cy="70" r="3" fill="#ffffff" />
  <circle cx="65" cy="75" r="3" fill="#ffffff" />
  <circle cx="80" cy="55" r="3" fill="#ffffff" />
</svg>
